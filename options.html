<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root { 
      --bg: #ffffff; --surface: #f9fafb; --text-main: #111827; --text-sub: #6b7280;
      --primary: #2563eb; --primary-hover: #1d4ed8; --border: #e5e7eb;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    body.dark-mode { 
      --bg: #0f172a; --surface: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8;
      --primary: #3b82f6; --primary-hover: #60a5fa; --border: #334155;
    }
    
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text-main); width: 380px; margin: 0; padding: 24px; box-sizing: border-box; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    h2 { margin: 0; font-size: 20px; font-weight: 700; color: var(--text-main); letter-spacing: -0.02em; }
    
    #themeToggle { 
      cursor: pointer; display: flex; align-items: center; justify-content: center; 
      width: 36px; height: 36px; border-radius: 50%; background: var(--surface); 
      border: 1px solid var(--border); color: var(--text-main);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #themeToggle:hover { background: var(--border); transform: rotate(15deg) scale(1.05); }
    #themeToggle svg { width: 20px; height: 20px; fill: currentColor; stroke: none; transition: transform 0.3s ease; }
    #themeToggle:active svg { transform: scale(0.9); }

    .field { margin-bottom: 18px; }
    label { display: block; font-size: 11px; color: var(--text-sub); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    
    select, input[type="text"], input[type="password"], textarea { 
      width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; 
      background: var(--surface); color: var(--text-main); box-sizing: border-box; outline: none; font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    select:focus, input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    textarea { resize: vertical; min-height: 60px; }

    button { 
      width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; 
      font-weight: 600; font-size: 13px; margin-top: 10px; transition: all 0.2s;
    }
    #saveBtn { background: var(--primary); color: #fff; box-shadow: var(--shadow); }
    #saveBtn:hover { background: var(--primary-hover); transform: translateY(-1px); }
    
    #fetchModelsBtn { background: var(--surface); border: 1px solid var(--border); color: var(--text-main); margin-top: 8px; font-size: 12px; }
    #fetchModelsBtn:hover { background: var(--border); }

    .checkbox-wrapper { display: flex; align-items: center; cursor: pointer; }
    .checkbox-wrapper input { width: 16px; height: 16px; margin-right: 10px; accent-color: var(--primary); cursor: pointer; }
    .checkbox-wrapper span { font-size: 13px; font-weight: 500; color: var(--text-main); }
    
    .row { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
    .secondary-btn { background: transparent; border: 1px dashed var(--border); color: var(--text-sub); margin-top: 0; }
    .secondary-btn:hover { background: var(--surface); color: var(--text-main); border-style: solid; }
    
    .hidden { display: none; }
    .status-msg { font-size: 12px; margin-top: 6px; min-height: 16px; font-weight: 500; }
    .success { color: #10b981; } .error { color: #ef4444; }

    .master-switch { 
        background: var(--surface); border: 1px solid var(--border); 
        padding: 14px; border-radius: 12px; margin-bottom: 24px;
        display: flex; align-items: center; justify-content: space-between;
    }
    .master-switch label { margin: 0; font-size: 14px; font-weight: 600; text-transform: none; color: var(--text-main); letter-spacing: normal; }
  </style>
</head>
<body>

  <div class="header">
    <h2>AI Selector</h2>
    <div id="themeToggle" title="Toggle Theme"></div>
  </div>

  <div class="master-switch">
    <label>Enable Extension</label>
    <div class="checkbox-wrapper">
      <input type="checkbox" id="extensionEnabled">
    </div>
  </div>

  <div class="field">
    <label>Provider</label>
    <select id="providerSelect">
      <option value="google">Google Gemini</option>
      <option value="groq">Groq</option>
      <option value="openrouter">OpenRouter</option>
      <option value="sambanova">SambaNova</option>
      <option value="cerebras">Cerebras</option>
      <option value="nvidia">Nvidia</option>
      <option value="ollama">Ollama (Local)</option>
    </select>
  </div>

  <div class="field" id="apiKeyField">
    <label id="apiKeyLabel">API Key</label>
    <input type="password" id="apiKey" placeholder="Enter API Key...">
  </div>

  <div class="field" id="ollamaHostField" class="hidden">
    <label>Ollama Host URL</label>
    <input type="text" id="ollamaHost" value="http://localhost:11434">
  </div>
  
  <div class="field">
    <label>Model</label>
    <select id="modelSelect"></select>
    <button id="fetchModelsBtn">↻ Fetch Available Models</button>
    <div id="fetchStatus" class="status-msg"></div>
  </div>

  <div id="googleSettings" class="hidden">
    <div class="field"><label class="checkbox-wrapper"><input type="checkbox" id="useSearch"> <span>Enable Google Search</span></label></div>
  </div>

  <div class="field">
    <label class="checkbox-wrapper"><input type="checkbox" id="confirmTrigger"> <span>Confirm Selection Triggers</span></label>
  </div>
  
  <div class="field">
    <label class="checkbox-wrapper"><input type="checkbox" id="easySelection"> <span>Enable Easy Selection (Hover to Select)</span></label>
  </div>

  <div class="field">
    <label>System Instructions</label>
    <textarea id="systemPrompt" placeholder="You are a helpful assistant."></textarea>
  </div>

  <button id="saveBtn">Save Settings</button>
  
  <div class="row">
    <button id="exportBtn" class="secondary-btn">Export</button>
    <button id="importBtn" class="secondary-btn">Import</button>
  </div>

  <script src="options.js"></script>
</body>
</html>
